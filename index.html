<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Body Aspect</title>
    <style>
      :root {
        color: #e8e8e8;
        background: #1d2e3a;
        font-family: Arial, sans-serif;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
      }

      main {
        width: min(720px, calc(100vw - 40px));
      }

      h1 {
        margin: 0 0 24px;
        font-size: 32px;
      }

      nav {
        display: grid;
        gap: 12px;
      }

      a {
        display: block;
        padding: 18px 20px;
        border: 1px solid rgba(232, 232, 232, 0.35);
        border-radius: 8px;
        color: #e8e8e8;
        background: #2a4353;
        text-decoration: none;
        font-size: 20px;
      }

      a:focus,
      a:hover {
        border-color: #d5b079;
        color: #d5b079;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Body Aspect</h1>
      <nav aria-label="Projects">
        <a href="./friendly-funicular/">Friendly Funicular</a>
        <a href="./effective-broccoli/">Effective Broccoli</a>
      </nav>
    </main>
  </body>
</html>
